{% extends "layout.html" %}

{% block content %}

<h1>Create Pokemon</h1>

<form method="post">

    <label>Name:</label><br>
    <input type="text" name="name"><br><br>

    <label>Type:</label><br>
    <input type="text" name="type"><br><br>

    <label>Level:</label><br>
    <input type="number" name="level"><br><br>

    <button type="submit">
        Save
    </button>

</form>

{% endblock %}
